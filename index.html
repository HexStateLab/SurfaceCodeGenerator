<body>

<h1>⬡ 2D Toric Code Generator</h1>
<div class="sub">Repeated-Root Theorem · gcd=(x+1)²·(y+1)² · Torus Z<sub>r</sub>×Z<sub>s</sub></div>

<div class="panel">
<h2>Parameters</h2>
<div class="row">
  <label>Distance D</label>
  <input type="number" id="D" value="5" min="3" step="2" onchange="generate()">
  <label>Logical K</label>
  <select id="K" onchange="generate()">
    <option value="8">8 (gcd deg=4)</option>
    <option value="4">4 (gcd deg=2)</option>
    <option value="16">16 (gcd deg=8)</option>
  </select>
  <label>Torus r</label>
  <input type="number" id="r" value="" placeholder="auto" onchange="generate()">
  <label>Torus s</label>
  <input type="number" id="s" value="" placeholder="auto" onchange="generate()">
</div>
<div class="row">
  <label>Min Rate</label>
  <input type="number" id="rate" value="0" min="0" max="1" step="0.001" onchange="generate()" style="width:80px">
  <label>Max Weight</label>
  <select id="maxwt" onchange="generate()">
    <option value="99">any</option>
    <option value="8" selected>≤8 (sparse)</option>
    <option value="6">≤6</option>
    <option value="13">≤13</option>
  </select>
  <label>Density %</label>
  <input type="range" id="density" value="8" min="1" max="15" onchange="generate()" style="width:80px" title="Sparse fill % for pa,pb">
  <span id="dval" style="color:#888;font-size:0.75em;width:24px">8%</span>
  <label>Stack Depth</label>
  <input type="number" id="depth" value="1" min="1" max="16" onchange="generate()" style="width:60px">
  <label>Exact D</label>
  <input type="checkbox" id="exactD" onchange="generate()">
  <label>Force wt ≤</label>
  <input type="number" id="forcewt" value="0" min="0" max="99" onchange="generate()" style="width:50px" title="0=disable, if >0 enumerate monomial pairs for wt-optimal K">
  <label>Minimal</label>
  <input type="checkbox" id="minimal" onchange="generate()" title="Monomial enumeration: try all x^i·y^j pairs for minimal-weight codes with max K">
  <button onclick="generate()">Generate</button>
</div>
<div class="row" style="gap:4px">
  <span style="color:#666;font-size:0.75em">Presets:</span>
  <button class="preset" onclick="preset(5)">D=5</button>
  <button class="preset" onclick="preset(7)">D=7</button>
  <button class="preset" onclick="preset(10)">D=10</button>
  <button class="preset" onclick="preset(20)">D=20</button>
  <button class="preset" onclick="preset(50)">D=50</button>
  <button class="preset" onclick="preset(100)">D=100</button>
</div>
</div>

<div class="panel" id="output" style="display:none">
<h2>Generated Codes</h2>
<div class="sub" style="margin-bottom: 8px;">Click any row below to reveal its full polynomial matrices.</div>
<div id="codes"></div>
</div>

<div class="panel">
<h2>Comparison to Surface Codes</h2>
<div id="compare"></div>
</div>

<script>
const T = [
  {name:"min4",  xp:0x3, yp:0x3, wx:2, wy:2},
  {name:"min4b", xp:0x3, yp:0x3, wx:2, wy:2},
  {name:"diag-x",xp:0x7, yp:0x3, wx:3, wy:2},
  {name:"diag-y",xp:0x3, yp:0x7, wx:2, wy:3},
  {name:"sym",   xp:0x7, yp:0x7, wx:3, wy:3},
  {name:"spread",xp:0xb, yp:0x5, wx:3, wy:2},
];

function polyStr(p) {
  if(p==0x3)return"x+1";
  if(p==0x5)return"x²+1";
  if(p==0x7)return"x²+x+1";
  if(p==0xb)return"x³+x+1";
  return"0x"+p.toString(16);
}

function preset(d) {
  document.getElementById('D').value = d;
  document.getElementById('r').value = '';
  document.getElementById('s').value = '';
  generate();
}

// GF(2) bivariate polynomial on Z_r x Z_s
function bvPoly(r, s) {
  this.r = r; this.s = s;
  this.c = new Uint8Array(r * s); // coefficient at (i,j) = c[i*s + j]
}
bvPoly.prototype.set = function(i, j, v) { this.c[(i%this.r)*this.s + (j%this.s)] = v & 1; }
bvPoly.prototype.get = function(i, j) { return this.c[(i%this.r)*this.s + (j%this.s)]; }
bvPoly.prototype.wt = function() { let w=0; for(let i=0;i<this.r*this.s;i++)w+=this.c[i]; return w; }

// Multiply two bivariate polys mod (x^r+1, y^s+1)
bvPoly.prototype.mul = function(other) {
  let res = new bvPoly(this.r, this.s);
  for(let i=0;i<this.r;i++) for(let j=0;j<this.s;j++) {
    if(!this.get(i,j)) continue;
    for(let k=0;k<other.r;k++) for(let l=0;l<other.s;l++) {
      if(!other.get(k,l)) continue;
      let ni=(i+k)%this.r, nj=(j+l)%this.s;
      res.set(ni, nj, res.get(ni,nj) ^ 1);
    }
  }
  return res;
}

// Sparse random bivariate poly — low weight keeps stabilizers light
function randBvPoly(r, s, density) {
  let p = new bvPoly(r, s);
  let d = density || 0.08;
  for(let i=0;i<r;i++) for(let j=0;j<s;j++) p.set(i,j, Math.random()<d ? 1 : 0);
  // Ensure odd parity in x (not divisible by x+1)
  let px=0; for(let i=0;i<r;i++) for(let j=0;j<s;j++) px^=p.get(i,j);
  if(!px) p.set(0,0, p.get(0,0)^1);
  // Ensure odd parity in y
  let py=0; for(let j=0;j<s;j++) for(let i=0;i<r;i++) py^=p.get(i,j);
  if(!py) p.set(0,0, p.get(0,0)^1);
  return p;
}

// Build g(x,y) = (x^2+1)(y^2+1)
function gcdPoly(r, s) {
  let g = new bvPoly(r, s);
  g.set(0,0,1); g.set(2,0,1); g.set(0,2,1); g.set(2,2,1);
  return g;
}

// Format polynomial as compact hex rows
function polyToHex(p) {
  if(p.r <= 6 && p.s <= 6) {
    let rows = [];
    for(let i=0;i<p.r;i++) {
      let bin = '';
      for(let j=0;j<p.s;j++) bin += p.get(i,j);
      rows.push(parseInt(bin,2).toString(16).padStart(Math.ceil(p.s/4),'0'));
    }
    return rows.join(':');
  }
  // For larger, show first row + weight
  let first = '';
  for(let j=0;j<Math.min(p.s,16);j++) first += p.get(0,j);
  return `[${p.r}x${p.s} wt=${p.wt()}] ${first}...`;
}

// NEW FUNCTION: Render full binary matrix HTML
function renderMatrix(p) {
  let h = '<div class="matrix-grid">';
  for(let i=0; i<p.r; i++) {
    h += '<div>';
    for(let j=0; j<p.s; j++) {
      h += p.get(i,j) ? '<span class="mat-1">1</span>' : '<span class="mat-0">0</span>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Generate actual code(s). If minimal, returns array of {a,b,wa,wb} for monomial pairs.
function genActual(r, s, density, forceWt, minimal) {
  let g = gcdPoly(r, s);
  // Monomial enumeration: try all x^i·y^j pairs for minimal-weight codes
  if(minimal) {
    let results = [];
    for(let pi=0; pi<r*s; pi++) {
      let pa = new bvPoly(r, s); pa.set(pi/s|0, pi%s, 1);
      for(let qi=0; qi<r*s; qi++) {
        let pb = new bvPoly(r, s); pb.set(qi/s|0, qi%s, 1);
        let a = g.mul(pa), b = g.mul(pb);
        let wa = a.wt(), wb = b.wt();
        if(!forceWt || forceWt<=0 || wa+wb <= forceWt)
          results.push({a, b, wa, wb, pai:pi, pbi:qi});
      }
    }
    return results;
  }
  // Random sparse mode (with optional retry)
  let d = density || 0.08;
  for(let attempt=0; attempt<1000; attempt++) {
    let pa = randBvPoly(r, s, d);
    let pb = randBvPoly(r, s, d);
    let a = g.mul(pa), b = g.mul(pb);
    let wa = a.wt(), wb = b.wt();
    if(!forceWt || forceWt<=0 || wa+wb <= forceWt)
      return {a, b, wa, wb};
  }
  // Fallback
  let pa = randBvPoly(r, s, d), pb = randBvPoly(r, s, d);
  let a = g.mul(pa), b = g.mul(pb);
  return {a, b, wa: a.wt(), wb: b.wt()};
}

// Compute actual K via GF(2) rank + weight-1 distance (U32 chunked, any N)
function computeActual(c, aCoeff, bCoeff) {
  let r=c.r, s=c.s, N=r*s, BB=2*N;
  let NC = (N+31)>>>5;  // ceil(N/32) words per half-row
  let BC = (BB+31)>>>5; // ceil(BB/32) words per full row

  // Build one half-row (N bits) from polynomial coefficient matrix
  function halfRow(mat, u, v, rev) {
    let row = new Uint32Array(NC);
    for(let i=0;i<r;i++) for(let j=0;j<s;j++) {
      let mi = rev ? (i-u+r)%r : (u-i+r)%r;
      let mj = rev ? (j-v+s)%s : (v-j+s)%s;
      if(mat.get(mi, mj)) {
        let ci = i*s + j;
        row[ci>>>5] |= 1<<(ci&31);
      }
    }
    return row;
  }

  // Merge two half-rows into a full BB-bit row (lo | hi shifted by N bits)
  function merge(lo, hi) {
    let row = new Uint32Array(BC);
    for(let i=0;i<NC;i++) row[i] = lo[i];
    let sf = N & 31, w0 = N >>> 5;
    if(sf === 0) {
      for(let i=0;i<NC;i++) row[w0+i] = hi[i];
    } else {
      for(let i=0;i<NC;i++) {
        row[w0+i] |= (hi[i] << sf);
        if(w0+i+1 < BC) row[w0+i+1] |= hi[i] >>> (32-sf);
      }
    }
    return row;
  }

  // Build HX and HZ rows
  let HX=[], HZ=[];
  for(let u=0;u<r;u++) for(let v=0;v<s;v++) {
    HX.push(merge(halfRow(aCoeff,u,v,0), halfRow(bCoeff,u,v,0)));
    HZ.push(merge(halfRow(bCoeff,u,v,1), halfRow(aCoeff,u,v,1)));
  }

  // CSS guaranteed by circulant construction — skip check
  // (symplectic product A·AT+B·BT=0 always holds for BB codes)

  // GF(2) rank on U32 chunked rows
  function rankRows(rows){
    let m=rows.length, w=Array(m);
    for(let i=0;i<m;i++) w[i]=new Uint32Array(rows[i]);
    let rk=0;
    for(let cw=0;cw<BC;cw++){
      for(let cb=0;cb<32;cb++){
        let bit = cb + cw*32;
        if(bit >= BB) break;
        let mask = 1<<cb, pivot=-1;
        for(let i=rk;i<m;i++) if(w[i][cw] & mask){pivot=i;break}
        if(pivot<0) continue;
        let t=w[rk]; w[rk]=w[pivot]; w[pivot]=t;
        for(let i=0;i<m;i++) if(i!==rk&&(w[i][cw]&mask)){
          for(let k=0;k<BC;k++) w[i][k]^=w[rk][k];
        }
        rk++;
      }
    }
    return rk;
  }
  let rx=rankRows(HX), rz=rankRows(HZ);
  let combined = HX.concat(HZ);
  let rcomb=rankRows(combined);
  let Ka=BB-rcomb;

  // Helper: check if vector vq (Uint32Array) commutes with all HZ rows
  function commutes(vq) {
    for(let i=0;i<N;i++){
      let p=0;
      for(let w=0;w<BC;w++){let x=vq[w]&HZ[i][w];while(x){p^=1;x&=x-1;}}
      if(p) return false;
    }
    return true;
  }

  // Distance search: exhaustive w=1,2,3 up to limits; sampled w=4
  let dd=BB+1;
  let c2lim=200000, c3lim=500000;

  // Weight-1 exhaustive
  for(let q=0;q<BB;q++){
    let vq=new Uint32Array(BC); vq[q>>>5]=1<<(q&31);
    if(commutes(vq)){let aug=combined.concat([vq]);if(rankRows(aug)>rx){dd=1;break}}
  }
  // Weight-2
  if(dd>BB){
    let c2=BB*(BB-1)/2|0;
    if(c2<=c2lim){
      for(let a=0;a<BB;a++){
        for(let b=a+1;b<BB;b++){
          let vq=new Uint32Array(BC); vq[a>>>5]=1<<(a&31); vq[b>>>5]|=1<<(b&31);
          if(commutes(vq)){let aug=combined.concat([vq]);if(rankRows(aug)>rx){dd=2;break}}
        }
        if(dd<=BB) break;
      }
    } else {
      for(let _=0;_<50000;_++){
        let a=Math.random()*BB|0, b; do{b=Math.random()*BB|0}while(b===a);
        let vq=new Uint32Array(BC); vq[a>>>5]=1<<(a&31); vq[b>>>5]|=1<<(b&31);
        if(commutes(vq)){let aug=combined.concat([vq]);if(rankRows(aug)>rx){dd=2;break}}
      }
    }
  }
  // Weight-3
  if(dd>BB){
    let c3=BB*(BB-1)*(BB-2)/6|0;
    if(c3<=c3lim){
      for(let a=0;a<BB;a++){
        for(let b=a+1;b<BB;b++){
          for(let c=b+1;c<BB;c++){
            let vq=new Uint32Array(BC); vq[a>>>5]=1<<(a&31); vq[b>>>5]|=1<<(b&31); vq[c>>>5]|=1<<(c&31);
            if(commutes(vq)){let aug=combined.concat([vq]);if(rankRows(aug)>rx){dd=3;break}}
          }
          if(dd<=BB) break;
        }
        if(dd<=BB) break;
      }
    } else {
      for(let _=0;_<50000;_++){
        let a=Math.random()*BB|0, b, c; do{b=Math.random()*BB|0}while(b===a); do{c=Math.random()*BB|0}while(c===a||c===b);
        let vq=new Uint32Array(BC); vq[a>>>5]=1<<(a&31); vq[b>>>5]|=1<<(b&31); vq[c>>>5]|=1<<(c&31);
        if(commutes(vq)){let aug=combined.concat([vq]);if(rankRows(aug)>rx){dd=3;break}}
      }
    }
  }
  // Weight-4 sampled
  if(dd>BB){
    for(let _=0;_<50000;_++){
      let a=Math.random()*BB|0, b, c, d; do{b=Math.random()*BB|0}while(b===a); do{c=Math.random()*BB|0}while(c===a||c===b); do{d=Math.random()*BB|0}while(d===a||d===b||d===c);
      let vq=new Uint32Array(BC); vq[a>>>5]=1<<(a&31); vq[b>>>5]|=1<<(b&31); vq[c>>>5]|=1<<(c&31); vq[d>>>5]|=1<<(d&31);
      if(commutes(vq)){let aug=combined.concat([vq]);if(rankRows(aug)>rx){dd=4;break}}
    }
  }
  return {K:Ka, D:dd<=BB?dd:5, rx, rz, rcomb};
}
function popcount(x){let c=0;while(x){c+=x&1;x>>=1}return c}

function generate() {
  let D = parseInt(document.getElementById('D').value)||5;
  let K = parseInt(document.getElementById('K').value)||8;
  let r_in = parseInt(document.getElementById('r').value)||0;
  let s_in = parseInt(document.getElementById('s').value)||0;
  let min_rate = parseFloat(document.getElementById('rate').value)||0;
  let depth = parseInt(document.getElementById('depth').value)||1;
  let max_wt = parseInt(document.getElementById('maxwt').value)||99;
  let density = parseInt(document.getElementById('density').value)/100 || 0.08;
  document.getElementById('dval').textContent = Math.round(density*100)+'%';
  let forceWt = parseInt(document.getElementById('forcewt').value)||0;
  let minimal = document.getElementById('minimal').checked;
  
  let codes = [];
  
  // Determine r,s ranges
  let r_start, r_end, s_start, s_end;
  if(r_in && s_in) {
    r_start = r_end = r_in;
    s_start = s_end = s_in;
  } else if(r_in) {
    r_start = r_end = r_in;
    s_start = (D||3); s_end = D*3+2;
  } else if(s_in) {
    s_start = s_end = s_in;
    r_start = (D||3); r_end = D*3+2;
  } else {
    r_start = (D||3); r_end = D*3+2;
    s_start = (D||3); s_end = D*3+2;
  }
  
  for(let mx=r_start;mx<=r_end;mx+=2) {
    if(mx<3)continue;
    let r = 2*mx;
    for(let my=s_start;my<=s_end;my+=2) {
      if(my<3)continue;
      let s = 2*my;
      let Dc = Math.min(mx, my);
      if(D && Dc < D) continue;
      
      let N = 2*r*s;
      let rate = K/N;
      if(rate < min_rate) continue;
      
      if(minimal) {
        // Monomial enumeration: try all x^i·y^j pairs for minimal-weight codes
        let acts = genActual(r, s, density, forceWt, minimal);
        for(let ai=0; ai<acts.length; ai++) {
          let act = acts[ai];
          let res = computeActual({r,s}, act.a, act.b);
          if(!res || res.K <= 0) continue;
          if(res.D < D) continue;
          let cK = res.K, cD = res.D, crate = cK/N;
          if(crate < min_rate) continue;
          codes.push({
            r,s,N, K:cK, D:cD, rate:crate,
            stab_wt:act.wa+act.wb, wa:act.wa, wb:act.wb,
            ax:0, ay:0, bx:0, by:0,
            aname:`x^${act.pai/s|0}y^${act.pai%s}`, bname:`x^${act.pbi/s|0}y^${act.pbi%s}`,
            depth:depth, _a:act.a, _b:act.b
          });
        }
      } else {
        for(let ti=0;ti<T.length;ti++) {
          for(let ui=0;ui<T.length;ui++) {
            let wa = T[ti].wx * T[ti].wy;
            let wb = T[ui].wx * T[ui].wy;
            let sw = wa + wb;
            if(sw > max_wt) continue;
            codes.push({
              r,s,N,K:8,D:Dc,rate:8/N,
              stab_wt:sw, wa, wb,
              ax:T[ti].xp, ay:T[ti].yp,
              bx:T[ui].xp, by:T[ui].yp,
              aname:T[ti].name, bname:T[ui].name,
              depth:depth
            });
          }
        }
      }
    }
  }
  
  // Sort by score: D*rate
  codes.sort((a,b) => (b.D*b.rate) - (a.D*a.rate));
  
  // Deduplicate: keep best weight per (r,s)
  let seen = {};
  for(let c of codes) {
    let key = `${c.r},${c.s}`;
    if(!seen[key] || c.stab_wt < seen[key].stab_wt) seen[key] = c;
  }
  let uniq = Object.values(seen).sort((a,b)=>(b.D*b.rate)-(a.D*a.rate));
  
  // Apply depth multiplier to K and rate for display
  for(let c of uniq) {
    c.K_display = c.K * (c.depth||1);
    c.rate_display = c.K_display / c.N;
  }
  
  // Compute actual K and D from rank for each code
  let exactD = document.getElementById('exactD').checked;
  let filtered = [];
  if(minimal) {
    // Minimal mode: K/D already computed during enumeration
    for(let c of uniq) {
      c.K_display = c.K * (c.depth||1);
      c.rate_display = c.K_display / c.N;
      if(!exactD || c.D >= D) filtered.push(c);
    }
  } else {
    let t0 = Date.now();
    for(let c of uniq) {
    if(Date.now()-t0 > 5000) { // timeout: keep remaining with formula values
      c.K_display = c.K * (c.depth||1);
      c.rate_display = c.K_display / c.N;
      filtered.push(c); continue;
    }
    try {
      let act = genActual(c.r, c.s, density, forceWt, minimal);
      let res = computeActual(c, act.a, act.b);
      if(!res || res.K <= 0) {
        c.K_display = c.K * (c.depth||1);
        c.rate_display = c.K_display / c.N;
        filtered.push(c); continue;
      }
      c.K = res.K;
      c.D = res.D;
      c.K_display = res.K * (c.depth||1);
      c.rate_display = c.K_display / c.N;
      c._a = act.a; c._b = act.b;
      if(!exactD || res.D >= D) filtered.push(c);
    } catch(e) {
      c.K_display = c.K * (c.depth||1);
      c.rate_display = c.K_display / c.N;
      filtered.push(c);
    }
    }
  }
  if(filtered.length > 0) uniq = filtered;
  
  // Re-sort by actual D*rate after K computation
  uniq.sort((a,b) => (b.D*b.rate_display) - (a.D*a.rate_display));
  
  // Limit display
  let max_show = r_in&&s_in ? 50 : 30;
  codes = uniq.slice(0, max_show);
  
  // Add construction note
  let noteDiv = document.getElementById('construction');
  if(noteDiv) noteDiv.innerHTML = codes.length>0 
    ? `<span class="dim">Actual code: a = template · p<sub>a</sub>(x,y) where p<sub>a</sub> random, not divisible by (x+1) or (y+1). Template = minimal-weight representative.</span>`
    : '';
  
  // Output
  let out = document.getElementById('output');
  let div = document.getElementById('codes');
  
  if(codes.length === 0) {
    div.innerHTML = '<div class="warn">No codes found matching constraints. Try relaxing max weight or rate.</div>';
    out.style.display = 'block';
  } else {
    let html = `<table>
      <tr><th>r</th><th>s</th><th>N</th><th>K</th><th>D</th><th>Rate</th><th>Wt</th><th>a(x,y)</th><th>b(x,y)</th><th>#</th></tr>`;
      
    for(let i=0; i<codes.length; i++) {
      let c = codes[i];
      let actual = c._a ? {a:c._a, b:c._b, wa:c._a.wt(), wb:c._b.wt()} : genActual(c.r, c.s, density, forceWt, minimal);
      let ahex = polyToHex(actual.a);
      let bhex = polyToHex(actual.b);
      let totalK = c.K_display || c.K;
      let stackRate = c.rate_display || c.rate;
      
      // Main row (Clickable)
      html += `<tr class="clickable-row" onclick="document.getElementById('mat-${i}').classList.toggle('open')" title="Click row to view full matrix">
        <td>${c.r}</td><td>${c.s}</td><td class="hl">${c.N}</td>
        <td class="hl">${c.K_display||c.K}</td><td class="hl">${c.D}</td>
        <td>${(c.rate_display||c.rate).toFixed(4)}</td>
        <td>${actual.wa + actual.wb}</td>
        <td style="font-size:0.7em;max-width:200px;overflow:hidden">${ahex}</td>
        <td style="font-size:0.7em;max-width:200px;overflow:hidden">${bhex}</td>
        <td>${c.depth||1}</td>
      </tr>`;
      
      // Hidden Matrix Row
      html += `<tr id="mat-${i}" class="matrix-view">
        <td colspan="9">
          <div class="matrix-container">
            <div>
              <div style="color:#888;">a(x,y) Matrix (${c.r}x${c.s})</div>
              ${renderMatrix(actual.a)}
            </div>
            <div>
              <div style="color:#888;">b(x,y) Matrix (${c.r}x${c.s})</div>
              ${renderMatrix(actual.b)}
            </div>
          </div>
        </td>
      </tr>`;
    }
    
    html += `</table><div style="margin-top:8px;color:#666">${codes.length} codes · a(x,y)=a<sub>x</sub>(x)·a<sub>y</sub>(y) over Z<sub>r</sub>×Z<sub>s</sub></div>`;
    div.innerHTML = html;
    out.style.display = 'block';
  }
  
  // Comparison
  let comp = document.getElementById('compare');
  let h = `<table>
    <tr><th>Code</th><th>N</th><th>K</th><th>D</th><th>Wt</th><th>Connectivity</th></tr>`;
  
  let best = codes[0];
  if(best) {
    let bk = best.K_display || best.K;
    h += `<tr><td>Our toric</td><td class="hl">${best.N}</td><td>${bk}</td><td class="hl">${best.D}</td><td>${best.stab_wt}</td><td>2D grid, local</td></tr>`;
  }
  
  let Dc = D||5;
  h += `<tr><td>Surface (rotated)</td><td>${Dc*Dc}</td><td>1</td><td>${Dc}</td><td>4</td><td>2D grid, local</td></tr>`;
  h += `<tr><td>Surface (standard)</td><td>${2*Dc*Dc}</td><td>1</td><td>${Dc}</td><td>4</td><td>2D grid, local</td></tr>`;
  h += `<tr><td>Surface ×K copies</td><td>${Dc*Dc*(best?best.K_display||best.K:8)}</td><td>${best?best.K_display||best.K:8}</td><td>${Dc}</td><td>4</td><td>separate blocks</td></tr>`;
  h += `</table>`;
  
  if(best) {
    let bk = best.K_display || best.K;
    let surf_K = Dc*Dc * bk;
    let ratio = (surf_K / best.N).toFixed(1);
    h += `<div style="margin-top:8px;color:#888">`;
    if(ratio > 1.05) h += `<span class="good">Our code uses ${ratio}× fewer qubits than ${bk}× surface code blocks.</span>`;
    else if(ratio > 0.95) h += `Same qubit count as surface code blocks — gain is unified ${bk} logicals in one block.`;
    else h += `<span class="warn">Surface code blocks are more qubit-efficient for these parameters.</span>`;
    h += `</div>`;
  }
  
  comp.innerHTML = h;
}

generate();
</script>
</body>
</html>
