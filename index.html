<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Toric Code Generator — Repeated-Root Theorem</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#c0c0d0;font-family:monospace;padding:20px;max-width:900px;margin:auto}
h1{color:#00d4aa;font-size:1.4em;margin-bottom:4px}
.sub{color:#666;font-size:0.8em;margin-bottom:20px}
.panel{background:#111118;border:1px solid #222;border-radius:6px;padding:16px;margin-bottom:16px}
.panel h2{color:#00b4d8;font-size:1em;margin-bottom:10px}
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.row label{color:#888;font-size:0.85em;min-width:60px}
input,select{background:#1a1a25;border:1px solid #333;color:#e0e0e0;padding:6px 10px;border-radius:4px;font-family:monospace;font-size:0.9em;width:100px}
input:focus,select:focus{outline:none;border-color:#00d4aa}
button{background:#00b4d8;color:#000;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:monospace;font-weight:bold;font-size:0.9em}
button:hover{background:#00d4aa}
.result{margin-top:10px;padding:12px;background:#0d0d14;border-radius:4px;font-size:0.85em;line-height:1.6}
.result .hl{color:#00d4aa;font-weight:bold}
.result .dim{color:#888}
.result .warn{color:#f0a040}
.result .good{color:#00d4aa}
table{width:100%;border-collapse:collapse;font-size:0.8em;margin-top:8px}
th{color:#888;text-align:left;padding:4px 8px;border-bottom:1px solid #222}
td{padding:4px 8px;border-bottom:1px solid #1a1a22}
td.hl{color:#00d4aa}
.slider{width:100%}
.preset{border:1px solid #333;background:#1a1a25;color:#888;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:0.8em;margin:2px}
.preset:hover{background:#222;color:#ccc}
.preset.active{background:#00b4d8;color:#000;border-color:#00b4d8}

/* New Matrix Expansion Styles */
.clickable-row { cursor: pointer; transition: background 0.2s; }
.clickable-row:hover { background: #1a1a25; }
.matrix-view { display: none; background: #050508; }
.matrix-view.open { display: table-row; }
.matrix-container { display: flex; gap: 30px; overflow: auto; max-height: 400px; padding: 15px; border-left: 3px solid #00d4aa; }
.matrix-grid { font-family: monospace; font-size: 14px; line-height: 1.1; letter-spacing: 6px; background: #111118; padding: 12px; border-radius: 4px; border: 1px solid #222; margin-top: 8px; }
.mat-1 { color: #00d4aa; text-shadow: 0 0 4px #00d4aa88; font-weight: bold; }
.mat-0 { color: #333; }
#codes { max-height: 70vh; overflow-y: auto; }
</style>
</head>
<body>

<h1>⬡ 2D Toric Code Generator</h1>
<div class="sub">Repeated-Root Theorem · gcd=(x+1)²·(y+1)² · Torus Z<sub>r</sub>×Z<sub>s</sub></div>

<div class="panel">
<h2>Parameters</h2>
<div class="row">
  <label>Distance D</label>
  <input type="number" id="D" value="5" min="3" step="2" onchange="generate()">
  <label>Logical K</label>
  <select id="K" onchange="generate()">
    <option value="8">8 (gcd deg=4)</option>
    <option value="4">4 (gcd deg=2)</option>
    <option value="16">16 (gcd deg=8)</option>
  </select>
  <label>Torus r</label>
  <input type="number" id="r" value="" placeholder="auto" onchange="generate()">
  <label>Torus s</label>
  <input type="number" id="s" value="" placeholder="auto" onchange="generate()">
  <label>N</label>
  <input type="number" id="Nfilter" value="" placeholder="any" onchange="generate()" style="width:70px">
</div>
<div class="row">
  <label>Min Rate</label>
  <input type="number" id="rate" value="0" min="0" max="1" step="0.001" onchange="generate()" style="width:80px">
  <label>Max Weight</label>
  <select id="maxwt" onchange="generate()">
    <option value="99">any</option>
    <option value="8" selected>≤8 (sparse)</option>
    <option value="6">≤6</option>
    <option value="13">≤13</option>
  </select>
  <label>Minimal</label>
  <input type="checkbox" id="minimal" onchange="generate()" title="Algebraic weight-8 codes: monomial &amp; chain families">
  <label>Depth</label>
  <input type="number" id="depth" value="1" min="1" max="16" onchange="generate()" style="width:50px">
  <label>Density %</label>
  <input type="range" id="density" value="8" min="1" max="50" onchange="generate()" style="width:60px" title="Sparse fill % for random pa,pb">
  <span id="dval">8%</span>
  <button onclick="generate()">Generate</button>
</div>
</div>

<div class="panel" id="output" style="display:none">
<h2>Generated Codes</h2>
<div class="sub" style="margin-bottom: 8px;">Click any row below to reveal its full polynomial matrices.</div>
<div id="codes"></div>
</div>

<div class="panel">
<h2>Comparison to Surface Codes</h2>
<div id="compare"></div>
</div>

<script>
// gcdPoly(r,s) = (x²+1)(y²+1) always has exactly 4 nonzero terms as long as r,s>=6
// (no wraparound collisions) — true for every (r,s) the sweep visits below, since the
// search always requires mx,my>=3 i.e. r,s>=6. Used to avoid building the actual
// matrix just to read back its weight.
const G_WT = 4;

const T = [
  {name:"min4",  xp:0x3, yp:0x3, wx:2, wy:2},
  {name:"min4b", xp:0x3, yp:0x3, wx:2, wy:2},
  {name:"diag-x",xp:0x7, yp:0x3, wx:3, wy:2},
  {name:"diag-y",xp:0x3, yp:0x7, wx:2, wy:3},
  {name:"sym",   xp:0x7, yp:0x7, wx:3, wy:3},
  {name:"spread",xp:0xb, yp:0x5, wx:3, wy:2},
];

// Cache of {a,b} bvPoly pairs for currently-displayed rows, indexed by row #.
// Matrix HTML is only built (and cached) the first time a row is expanded,
// instead of eagerly for every row at generate() time.
let lastActuals = [];

function toggleMatrix(i) {
  let row = document.getElementById('mat-'+i);
  if(!row) return;
  row.classList.toggle('open');
  if(row.classList.contains('open') && row.dataset.rendered !== '1') {
    let actual = lastActuals[i];
    if(!actual) return;
    let container = document.getElementById('mc-'+i);
    container.innerHTML = `
      <div><div style="color:#888;">a(x,y) Matrix (${actual.a.r}x${actual.a.s})</div>${renderMatrix(actual.a)}</div>
      <div><div style="color:#888;">b(x,y) Matrix (${actual.b.r}x${actual.b.s})</div>${renderMatrix(actual.b)}</div>`;
    row.dataset.rendered = '1';
  }
}

function polyStr(p) {
  if(p==0x3)return"x+1";
  if(p==0x5)return"x²+1";
  if(p==0x7)return"x²+x+1";
  if(p==0xb)return"x³+x+1";
  return"0x"+p.toString(16);
}

// GF(2) bivariate polynomial on Z_r x Z_s
function bvPoly(r, s) {
  this.r = r; this.s = s;
  this.c = new Uint8Array(r * s); // coefficient at (i,j) = c[i*s + j]
  this.nz = new Set(); // indices of set bits — keeps mul()/wt() proportional to
                        // actual sparsity instead of always scanning all r*s cells
}
bvPoly.prototype.set = function(i, j, v) {
  let idx = (i%this.r)*this.s + (j%this.s);
  let bit = v & 1;
  if(this.c[idx] === bit) return; // no change — skip Set bookkeeping entirely.
  // Matters because randBvPoly writes every cell of a (possibly large) dense grid,
  // mostly with v=0 on cells that were already 0; without this check that's a wasted
  // Set op per cell, which dominates runtime once r,s get into the hundreds.
  this.c[idx] = bit;
  if(bit) this.nz.add(idx); else this.nz.delete(idx);
}
bvPoly.prototype.get = function(i, j) { return this.c[(i%this.r)*this.s + (j%this.s)]; }
bvPoly.prototype.wt = function() { return this.nz.size; }

// Multiply two bivariate polys mod (x^r+1, y^s+1). These polys are always sparse in
// practice (templates/g/chains are weight ~2-14), so iterate only the nonzero terms
// of each side rather than the full r*s grid — O(nnz(this)*nnz(other)) instead of
// O(r*s + nnz(this)*r*s), which matters a lot once r,s get into the hundreds.
bvPoly.prototype.mul = function(other) {
  let res = new bvPoly(this.r, this.s);
  for(let idx1 of this.nz) {
    let i = (idx1 / this.s) | 0, j = idx1 % this.s;
    for(let idx2 of other.nz) {
      let k = (idx2 / other.s) | 0, l = idx2 % other.s;
      let ni=(i+k)%this.r, nj=(j+l)%this.s;
      res.set(ni, nj, res.get(ni,nj) ^ 1);
    }
  }
  return res;
}

// Random bivariate poly not divisible by (x+1) in either variable
function randBvPoly(r, s, density) {
  let p = new bvPoly(r, s);
  let d = density || 0.08;
  let count = Math.round(d * r * s);
  for(let n=0; n<count; n++) {
    p.set((Math.random()*r)|0, (Math.random()*s)|0, 1);
  }
  // Ensure odd total weight (the original's two "parity in x"/"parity in y" checks
  // both reduce to this same condition — XOR over all cells is order-independent —
  // and their combined net effect was always to force odd weight, never even).
  if(p.nz.size % 2 === 0) p.set(0,0, p.get(0,0)^1);
  return p;
}

// Build g(x,y) = (x^2+1)(y^2+1)
function gcdPoly(r, s) {
  let g = new bvPoly(r, s);
  g.set(0,0,1); g.set(2,0,1); g.set(0,2,1); g.set(2,2,1);
  return g;
}

// Format polynomial as compact hex rows
function polyToHex(p) {
  if(p.r <= 6 && p.s <= 6) {
    let rows = [];
    for(let i=0;i<p.r;i++) {
      let bin = '';
      for(let j=0;j<p.s;j++) bin += p.get(i,j);
      rows.push(parseInt(bin,2).toString(16).padStart(Math.ceil(p.s/4),'0'));
    }
    return rows.join(':');
  }
  // For larger, show first row + weight
  let first = '';
  for(let j=0;j<Math.min(p.s,16);j++) first += p.get(0,j);
  return `[${p.r}x${p.s} wt=${p.wt()}] ${first}...`;
}

// NEW FUNCTION: Render full binary matrix HTML
function renderMatrix(p) {
  let h = '<div class="matrix-grid">';
  for(let i=0; i<p.r; i++) {
    h += '<div>';
    for(let j=0; j<p.s; j++) {
      h += p.get(i,j) ? '<span class="mat-1">1</span>' : '<span class="mat-0">0</span>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Generate actual code. Minimal mode: algebraic weight-8 codes.
function genActual(r, s, density, minimal) {
  let g = gcdPoly(r, s);
  if(minimal) {
    // Algebraic codes: a=g (or shifted), b from chain or monomial family
    // Return null signals caller to use algebraic K/D
    return null;
  }
  // Random sparse mode
  let d = density || 0.08;
  let pa = randBvPoly(r, s, d);
  let pb = randBvPoly(r, s, d);
  let a = g.mul(pa), b = g.mul(pb);
  return {a, b, wa: a.wt(), wb: b.wt()};
}

// Rebuild the actual {a,b} bvPoly pair for a code, lazily — only called for codes
// that are actually displayed (after the dedup+slice), not during the search sweep.
function buildMonoActual(r,s,ai,aj,bi,bj) {
  let g = gcdPoly(r,s);
  let pa = new bvPoly(r,s); pa.set(ai,aj,1);
  let pb = new bvPoly(r,s); pb.set(bi,bj,1);
  let a = g.mul(pa), b = g.mul(pb);
  return {a, b, wa:a.wt(), wb:b.wt()};
}
function buildChainActual(r,s,axis,a0,m) {
  let g = gcdPoly(r,s);
  let pb = new bvPoly(r,s);
  if(axis==='x') { for(let t=0;t<=m;t++){pb.set(0,(a0+2*t)%s,1);pb.set(2,(a0+2*t)%s,1);} }
  else { for(let t=0;t<=m;t++){pb.set((a0+2*t)%r,0,1);pb.set((a0+2*t)%r,2,1);} }
  let b = g.mul(pb);
  return {a:g, b, wa:g.wt(), wb:b.wt()};
}
function renderActual(c, density, minimal) {
  if(c.family === 'mono') return buildMonoActual(c.r,c.s,c.ax,c.ay,c.bx,c.by);
  if(c.family === 'chain') return buildChainActual(c.r,c.s,c.chainAxis,c.chainA,c.chainM);
  // Non-minimal/"Random Sparse" codes: original behavior, a genuinely random
  // density-driven a,b (a=g·randBvPoly(...)). T[] is only a coarse feasibility
  // heuristic used during search (is *some* sparse code plausible at this size?);
  // it never determined the displayed matrix, even in the unmodified file. My first
  // pass at this made it deterministic from T[], which killed the actual point of
  // "Random Sparse" mode (exploring different random sparse fills) — reverted.
  return genActual(c.r, c.s, density, minimal);
}

function generate() {
  let D = parseInt(document.getElementById('D').value)||5;
  let K = parseInt(document.getElementById('K').value)||8;
  let r_in = parseInt(document.getElementById('r').value)||0;
  let s_in = parseInt(document.getElementById('s').value)||0;
  let min_rate = parseFloat(document.getElementById('rate').value)||0;
  let max_wt = parseInt(document.getElementById('maxwt').value)||99;
  let depth = parseInt(document.getElementById('depth').value)||1;
  let density = parseInt(document.getElementById('density').value)/100 || 0.08;
  document.getElementById('dval').textContent = Math.round(density*100)+'%';
  let minimal = document.getElementById('minimal').checked;
  let Nfilter = parseInt(document.getElementById('Nfilter').value)||0;
  
  // Build (r,s) candidate list: either from ranges or directly from N filter
  let pairs = [];
  if(Nfilter && !r_in && !s_in) {
    // Derive r,s from N = 2rs → rs = N/2, r=2mx, s=2my → mx*my = N/8
    let n8 = Nfilter/8;
    for(let mx=3; mx*mx<=n8; mx++) {
      if(n8 % mx === 0) {
        let my = n8/mx;
        if(my >= 3) {
          let Dc = Math.min(mx, my);
          if(!D || Dc >= D) pairs.push({r:2*mx, s:2*my, Dc});
          if(mx !== my && (!D || Dc >= D)) pairs.push({r:2*my, s:2*mx, Dc});
        }
      }
    }
    if(pairs.length === 0) {
      // No exact r,s from N — fall through to empty codes
    }
  }
  
  // sweepEnd bounds how far the search extends past D. D*3+2 is fine for normal D
  // (≤~30) and preserves existing behavior there; for very large D it instead grows
  // by a constant +60 window so the (r,s) sweep doesn't grow quadratically with D.
  // No absolute ceiling — the actual fix for big-D blowups was making mul()/wt()
  // proportional to sparsity instead of r*s (see bvPoly above), not limiting D itself.
  let sweepEnd = (Dv) => Math.min(Dv*3+2, Dv+60);

  let codes = [];
  
  // Determine r,s ranges
  let r_start, r_end, s_start, s_end;
  if(r_in && s_in) {
    r_start = r_end = r_in;
    s_start = s_end = s_in;
  } else if(r_in) {
    r_start = r_end = r_in;
    s_start = (D||3); s_end = sweepEnd(D||3);
  } else if(s_in) {
    s_start = s_end = s_in;
    r_start = (D||3); r_end = sweepEnd(D||3);
  } else {
    r_start = (D||3); r_end = sweepEnd(D||3);
    s_start = (D||3); s_end = sweepEnd(D||3);
  }
  
  let SEARCH_CAP = 20000; // hard cap on raw (pre-dedup) entries to keep generate() responsive
  search:
  for(let pi=0; pi<(pairs.length>0?pairs.length:1); pi++) {
    // Range start/end for iteration
    let r_start2 = pairs.length>0 ? pairs[pi].r/2 : r_start;
    let r_end2   = pairs.length>0 ? pairs[pi].r/2 : r_end;
    let s_start2 = pairs.length>0 ? pairs[pi].s/2 : s_start;
    let s_end2   = pairs.length>0 ? pairs[pi].s/2 : s_end;
    for(let mx=r_start2; mx<=r_end2; mx++) {
      if(mx<3)continue;
      let r = 2*mx;
    for(let my=s_start2; my<=s_end2; my++) {
      if(my<3)continue;
      let s = 2*my;
      let Dc = Math.min(mx, my);
      if(D && Dc < D) continue;
      if(codes.length > SEARCH_CAP) break search;
      
      let N = 2*r*s, Rs = r*s;
      if(Nfilter && N !== Nfilter) continue;
      
      if(minimal) {
        // === ALGEBRAIC WEIGHT-8 ===
        // Family 1: monomial → dependent HX/HZ → max K
        // a,b are g shifted by a monomial, so their weight is always g's weight (G_WT)
        // regardless of shift — no need to actually build the matrices during the sweep.
        let K1 = Rs + 2*r + 2*s - 4;
        if(K1/N >= min_rate) {
          let shifts = [[0,0,2,2],[r/2|0,s/2|0,1,1]];
          for(let [ai,aj,bi,bj] of shifts) {
            ai%=r; aj%=s; bi%=r; bj%=s;
            codes.push({r,s,N,K:K1*depth,D:Dc,rate:K1*depth/N,stab_wt:G_WT*2,wa:G_WT,wb:G_WT,ax:ai,ay:aj,bx:bi,by:bj,aname:'mono',bname:`${ai},${aj}`,depth,family:'mono'});
          }
        }
        // Family 2: chain f=(1+x²)·chain(y) → independent HX/HZ → K=4r+4s-8
        // b's weight depends on whether the chain's positions collide mod r/s, so it
        // still has to be built once to verify weight===4 — but it's discarded right
        // after the check instead of being kept alive in the codes array.
        let K2 = 4*r + 4*s - 8;
        if(K2/N >= min_rate && K2 !== K1) {
          let g = gcdPoly(r, s), added=0;
          for(let a=0; a<s && added<3; a++)
            for(let m=0; a+2*m+2<s && added<3; m++) {
              let pb=new bvPoly(r,s);
              for(let t=0;t<=m;t++){pb.set(0,(a+2*t)%s,1);pb.set(2,(a+2*t)%s,1);}
              let b=g.mul(pb); if(b.wt()!==4)continue;
              codes.push({r,s,N,K:K2*depth,D:Dc,rate:K2*depth/N,stab_wt:G_WT+4,wa:G_WT,wb:4,aname:'chain-x',bname:`a${a}m${m}`,depth,family:'chain',chainAxis:'x',chainA:a,chainM:m});
              added++;
            }
          for(let a=0; a<r && added<6; a++)
            for(let m=0; a+2*m+2<r && added<6; m++) {
              let pb=new bvPoly(r,s);
              for(let t=0;t<=m;t++){pb.set((a+2*t)%r,0,1);pb.set((a+2*t)%r,2,1);}
              let b=g.mul(pb); if(b.wt()!==4)continue;
              codes.push({r,s,N,K:K2*depth,D:Dc,rate:K2*depth/N,stab_wt:G_WT+4,wa:G_WT,wb:4,aname:'chain-y',bname:`a${a}m${m}`,depth,family:'chain',chainAxis:'y',chainA:a,chainM:m});
              added++;
            }
        }
        continue;
      }
      
      // === RANDOM SPARSE MODE ===
      // This block only determines FEASIBILITY at this (r,s) size — is there some
      // template pair sparse enough to fit Max Weight? — and records the winning
      // template's name/weight as a label. The actual displayed a,b matrix is built
      // independently at render time via genActual() (random, density-driven), same
      // as the original file. I tried making the displayed matrix deterministically
      // match the winning template (both with and without the shared g·() factor used
      // in "minimal" mode) and both attempts broke real things — template-only gave
      // weights disconnected from what the rest of the algorithm needs, and g·template
      // pushed weights to 16+, breaking the default Max Weight filter entirely. So this
      // stays as the original behavior: aname/bname/stab_wt are a labeled estimate of
      // sparsity at this size, not a literal description of the matrix shown below.
      let rate = K/N;
      if(rate < min_rate) continue;

      // Only the lowest-weight template pair survives dedup later anyway (dedup key
      // is r,s only), so find it directly instead of generating all 36 combinations.
      let bestTi=-1, bestUi=-1, bestSw=Infinity;
      for(let ti=0;ti<T.length;ti++) {
        for(let ui=0;ui<T.length;ui++) {
          let sw = T[ti].wx*T[ti].wy + T[ui].wx*T[ui].wy;
          if(sw > max_wt) continue;
          if(sw < bestSw) { bestSw = sw; bestTi = ti; bestUi = ui; }
        }
      }
      if(bestTi === -1) continue; // no template pair fits max_wt at this size

      codes.push({
        r,s,N,K,D:Dc,rate: K*depth/N,
        stab_wt:bestSw, wa:T[bestTi].wx*T[bestTi].wy, wb:T[bestUi].wx*T[bestUi].wy,
        ax:T[bestTi].xp, ay:T[bestTi].yp,
        bx:T[bestUi].xp, by:T[bestUi].yp,
        aname:T[bestTi].name, bname:T[bestUi].name,
        depth
      });
    }
  }
  }
  
  // Dedup (this also determines final order; pre-dedup sort was redundant and removed)
  let seen = {}, uniq = [];
  for(let c of codes) {
    let key = minimal ? `${c.r},${c.s},${c.aname},${c.bname}` : `${c.r},${c.s}`;
    if(!seen[key] || c.stab_wt < seen[key].stab_wt) seen[key] = c;
  }
  uniq = Object.values(seen).sort((a,b) => a.N - b.N);
  
  // Limit display
  let max_show = r_in&&s_in ? 50 : 30;
  codes = uniq.slice(0, max_show);
  
  // Note
  let noteDiv = document.getElementById('construction');
  if(noteDiv) noteDiv.innerHTML = codes.length>0 
    ? (minimal
      ? `<span class="dim">Algebraic weight-8: monomial K=rs+2r+2s−4, chain K=4r+4s−8, D=min(r/2,s/2). No brute-force.</span>`
      : `<span class="dim">Actual code: a = g·p<sub>a</sub>(x,y) where p<sub>a</sub> random, not divisible by (x+1) or (y+1). Template search (T[]) only checks size feasibility — it doesn't determine the displayed matrix, so Wt/K here are exploratory, not guaranteed.</span>`)
    : '';
  
  // Output
  let out = document.getElementById('output');
  let div = document.getElementById('codes');
  
  if(codes.length === 0) {
    div.innerHTML = '<div class="warn">No codes found matching constraints. Try relaxing max weight or rate.</div>';
    out.style.display = 'block';
  } else {
    let html = `<table>
      <tr><th>r</th><th>s</th><th>N</th><th>K</th><th>D</th><th>Rate</th><th>Wt</th><th>a(x,y)</th><th>b(x,y)</th><th>#</th></tr>`;
    
    lastActuals = [];
    for(let i=0; i<codes.length; i++) {
      let c = codes[i];
      let actual = renderActual(c, density, minimal);
      if(!actual) continue;
      lastActuals[i] = actual;
      let ahex = polyToHex(actual.a), bhex = polyToHex(actual.b);
      
      html += `<tr class="clickable-row" onclick="toggleMatrix(${i})" title="Click row to view full matrix">
        <td>${c.r}</td><td>${c.s}</td><td class="hl">${c.N}</td>
        <td class="hl">${c.K}</td><td class="hl">${c.D}</td>
        <td>${c.rate.toFixed(4)}</td>
        <td>${actual.wa + actual.wb}</td>
        <td style="font-size:0.7em;max-width:200px;overflow:hidden">${ahex}</td>
        <td style="font-size:0.7em;max-width:200px;overflow:hidden">${bhex}</td>
        <td>${c.depth||1}</td>
      </tr>`;
      
      // Matrix content is rendered lazily by toggleMatrix() on first expand —
      // previously this built renderMatrix() HTML (up to r×s spans, ×2) for
      // every row up front even if the user never expanded it.
      html += `<tr id="mat-${i}" class="matrix-view" data-rendered="0">
        <td colspan="10">
          <div class="matrix-container" id="mc-${i}"></div>
        </td>
      </tr>`;
    }
    
    html += `</table><div style="margin-top:8px;color:#666">${codes.length} codes · a(x,y)=a<sub>x</sub>(x)·a<sub>y</sub>(y) over Z<sub>r</sub>×Z<sub>s</sub></div>`;
    div.innerHTML = html;
    out.style.display = 'block';
  }
  
  // Comparison
  let comp = document.getElementById('compare');
  let h = `<table>
    <tr><th>Code</th><th>N</th><th>K</th><th>D</th><th>Wt</th><th>Connectivity</th></tr>`;
  
  let best = codes[0];
  if(best) {
    h += `<tr><td>Our toric</td><td class="hl">${best.N}</td><td>${best.K}</td><td class="hl">${best.D}</td><td>${best.stab_wt}</td><td>2D grid, local</td></tr>`;
  }
  
  let Dc = D||5;
  h += `<tr><td>Surface (rotated)</td><td>${Dc*Dc}</td><td>1</td><td>${Dc}</td><td>4</td><td>2D grid, local</td></tr>`;
  h += `<tr><td>Surface (standard)</td><td>${2*Dc*Dc}</td><td>1</td><td>${Dc}</td><td>4</td><td>2D grid, local</td></tr>`;
  h += `<tr><td>Surface ×K copies</td><td>${Dc*Dc*(best?best.K:8)}</td><td>${best?best.K:8}</td><td>${Dc}</td><td>4</td><td>separate blocks</td></tr>`;
  h += `</table>`;
  
  if(best) {
    let surf_K = Dc*Dc * best.K;
    let ratio = (surf_K / best.N).toFixed(1);
    h += `<div style="margin-top:8px;color:#888">`;
    if(ratio > 1.05) h += `<span class="good">Our code uses ${ratio}× fewer qubits than ${best.K}× surface code blocks.</span>`;
    else if(ratio > 0.95) h += `Same qubit count as surface code blocks — gain is unified ${best.K} logicals in one block.`;
    else h += `<span class="warn">Surface code blocks are more qubit-efficient for these parameters.</span>`;
    h += `</div>`;
  }
  
  comp.innerHTML = h;
}

generate();
</script>
</body>
</html>
